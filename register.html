<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register</title>
  <link rel="stylesheet" href="assets/css/style.css?v=size11">
</head>
<body class="site-page">
  <main class="site-shell" style="max-width: 620px;">
    <section class="site-card">
      <span class="site-kicker">Register</span>
      <h1 class="page-title">Create your account for the recommendation workspace.</h1>
      <p>Register to save your activity and move into the dashboard-style DSS workflow.</p>

      <form class="weight-grid" action="dashboard.html" style="margin-top: 22px;">
        <div class="filter-field">
          <label for="full_name">Full Name</label>
          <input id="full_name" type="text" placeholder="Enter your full name">
        </div>
        <div class="filter-field">
          <label for="reg_email">Email Address</label>
          <input id="reg_email" type="email" placeholder="you@example.com">
        </div>
        <div class="filter-field">
          <label for="institution">Institution</label>
          <input id="institution" type="text" placeholder="University or organization">
        </div>
        <div class="filter-field">
          <label for="reg_password">Password</label>
          <input id="reg_password" type="password" placeholder="Create a password">
        </div>
        <button class="site-link-btn primary" type="submit">Register</button>
        <a href="login.html" class="site-link-btn subtle">Already have an account?</a>
      </form>
    </section>
  </main>
</body>
</html>
